groups:
- name: fixmypaper-alerts
  rules:
  - alert: HighJobFailureRate
    expr: |
      sum(rate(fixmypaper_jobs_failed_total[1h])) / 
      sum(rate(fixmypaper_jobs_total[1h])) > 0.10
    for: 15m
    labels:
      severity: critical
    annotations:
      summary: "High failure rate detected (>10%)"
      description: "Document processing failure rate is at {{ $value | humanizePercentage }}."

  - alert: QueueBacklogWarning
    expr: fixmypaper_pending_jobs > 100
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "Queue backlog is high (>100 jobs)"
      description: "There are currently {{ $value }} pending jobs in the queue."

  - alert: WorkerDown
    expr: count(up{job="celery-worker"} == 1) < 1
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "No active Celery workers"
      description: "Document processing is currently stopped because no workers are active."
