apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixmypaper-api
  namespace: fixmypaper
  labels:
    app: fixmypaper-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fixmypaper-api
  template:
    metadata:
      labels:
        app: fixmypaper-api
    spec:
      serviceAccountName: fixmypaper-sa
      containers:
      - name: api
        image: your-ecr-repo/fixmypaper-api:latest
        ports:
        - containerPort: 5001
        envFrom:
        - configMapRef:
            name: fixmypaper-config
        # AWS credentials are now injected via IRSA (no Secret needed for keys)
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fixmypaper-api
  namespace: fixmypaper
spec:
  selector:
    app: fixmypaper-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5001
  type: ClusterIP
