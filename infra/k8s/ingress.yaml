apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fixmypaper-ingress
  namespace: fixmypaper
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # NOTE: User needs to provide their own certificate ARN
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:region:account-id:certificate/cert-id
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/success-codes: "200"
spec:
  rules:
  - host: api.fixmypaper.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fixmypaper-api
            port:
              number: 80
  - host: app.fixmypaper.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fixmypaper-frontend
            port:
              number: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fixmypaper-sa
  namespace: fixmypaper
  annotations:
    # NOTE: User needs to provide their own IAM role ARN created by Terraform
    # eks.amazonaws.com/role-arn: arn:aws:iam::account-id:role/fixmypaper-pod-role
