apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixmypaper-worker
  namespace: fixmypaper
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fixmypaper-worker
  template:
    metadata:
      labels:
        app: fixmypaper-worker
    spec:
      serviceAccountName: fixmypaper-sa
      containers:
      - name: worker
        image: fixmypaper-worker:latest
        command: ["celery", "-A", "backend.worker.celery_app", "worker", "--loglevel=info"]
        envFrom:
        - configMapRef:
            name: fixmypaper-config
        - secretRef:
            name: fixmypaper-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        livenessProbe:
          exec:
            command:
            - celery
            - -A
            - backend.worker.celery_app
            - inspect
            - ping
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
