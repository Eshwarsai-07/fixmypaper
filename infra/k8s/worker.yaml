apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixmypaper-worker
  namespace: fixmypaper
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fixmypaper-worker
  template:
    metadata:
      labels:
        app: fixmypaper-worker
    spec:
      containers:
      - name: worker
        image: ${ECR_REPO_URL}/fixmypaper-backend:latest
        command: ["celery", "-A", "backend.worker.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
        envFrom:
        - configMapRef:
            name: fixmypaper-config
        - secretRef:
            name: fixmypaper-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        # Since workers are consumers, we check process health
        livenessProbe:
          exec:
            command: ["celery", "-A", "backend.worker.celery_app", "inspect", "ping"]
          initialDelaySeconds: 60
          periodSeconds: 30
      # Use dedicated node group
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              key: eks.amazonaws.com/nodegroup
              operator: In
              values:
              - worker-node-group
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fixmypaper-worker-hpa
  namespace: fixmypaper
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fixmypaper-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
