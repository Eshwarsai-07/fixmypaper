apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixmypaper-api
  namespace: fixmypaper
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fixmypaper-api
  template:
    metadata:
      labels:
        app: fixmypaper-api
    spec:
      containers:
      - name: api
        image: ${ECR_REPO_URL}/fixmypaper-backend:latest
        ports:
        - containerPort: 5001
        envFrom:
        - configMapRef:
            name: fixmypaper-config
        - secretRef:
            name: fixmypaper-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fixmypaper-api
  namespace: fixmypaper
spec:
  selector:
    app: fixmypaper-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fixmypaper-api-hpa
  namespace: fixmypaper
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fixmypaper-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
