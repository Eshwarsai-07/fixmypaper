apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixmypaper-frontend
  namespace: fixmypaper
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fixmypaper-frontend
  template:
    metadata:
      labels:
        app: fixmypaper-frontend
    spec:
      containers:
      - name: frontend
        image: ${ECR_REPO_URL}/fixmypaper-frontend:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fixmypaper-frontend
  namespace: fixmypaper
spec:
  selector:
    app: fixmypaper-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: NodePort
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fixmypaper-frontend-hpa
  namespace: fixmypaper
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fixmypaper-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
