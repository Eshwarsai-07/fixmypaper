services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fixmypaper
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d fixmypaper"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  grobid:
    image: lfoppiano/grobid:0.8.0
    ports:
      - "8070:8070"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/fixmypaper
      REDIS_URL: redis://redis:6379/0
      GROBID_URL: http://grobid:8070
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    ports:
      - "10000:10000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.app.workers.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/fixmypaper
      REDIS_URL: redis://redis:6379/0
      GROBID_URL: http://grobid:8070
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:10000/api
    depends_on:
      - backend
